services:
  rounds-api:
    build:
      context: .
    container_name: ludo-rounds-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8083}:${PORT:-8083}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 8083) + '/health').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
